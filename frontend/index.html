<!doctype html>
<!--
  Buttons & Bubbles CIC
  =====================
  If you're reading this, welcome! This is the front door to
  our little corner of the internet. We're a CIC that believes
  in representation through imagination and play.

  Built with React + TanStack Router + Tailwind CSS.

  Fancy getting involved? Check out /get-involved 👋
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="index, follow" />
    <meta name="googlebot" content="index, follow" />
    <!-- Straightforward description so search engines know what we're about -->
    <meta
      name="description"
      content="Buttons & Bubbles CIC increases representation and inclusion around disability for everybody through imagination and play. Accessible workshops, activity packs, and community events."
    />
    <meta
      name="keywords"
      content="disability inclusion, accessible workshops, activity packs, community events, representation, imagination, play, Bubble World, accessibility training"
    />
    <!-- Open Graph stuff so links look nice when shared on socials -->
    <meta
      property="og:title"
      content="Buttons & Bubbles CIC — Representation Through Imagination & Play"
    />
    <meta
      property="og:description"
      content="Increasing representation and inclusion around disability through imagination and play. Accessible workshops, activity packs, and community events."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://buttonsandbubbles.org.uk" />
    <!-- TODO: swap with actual OG image once we have a proper one designed -->
    <meta property="og:image" content="https://buttonsandbubbles.org.uk/og-image.jpg" />
    <meta property="og:image:alt" content="Buttons & Bubbles CIC Logo" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Buttons & Bubbles CIC — Representation Through Imagination & Play"
    />
    <meta
      name="twitter:description"
      content="Increasing representation and inclusion around disability through imagination and play."
    />
    <meta name="twitter:image" content="https://buttonsandbubbles.org.uk/og-image.jpg" />
    <meta name="author" content="Buttons & Bubbles CIC" />
    <meta name="theme-color" content="#1e3a5f" />
    <link rel="canonical" href="https://buttonsandbubbles.org.uk" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <!-- Preconnect to Google Fonts so text renders faster -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!--
      Fonts we use:
      - Nunito: headings, looks friendly and round
      - Open Sans: body text, readable at small sizes
      - Atkinson Hyperlegible: designed for legibility, great for accessibility
      - Lexend: used with the "readable font" toggle, wider letter spacing
    -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Open+Sans:wght@400;500;600;700&family=Atkinson+Hyperlegible:wght@400;700&family=Lexend:wght@400;500;600;700&display=swap"
    />
    <title>Buttons & Bubbles CIC — Representation Through Imagination & Play</title>
  </head>
  <body>
    <!--
      React mounts here. Everything else lives in /src.
      The root div should never be empty for long ⚡
    -->
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
